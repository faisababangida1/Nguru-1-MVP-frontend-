<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguru AI Mentorship</title>
    <style>
        /* This is the CSS to make it look like a modern mobile app */
        body { 
            font-family: Arial, sans-serif; 
            padding: 24px; 
            background-color: #FAFAFA; 
            margin: 0;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            margin-top: 40px;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p.subtitle { color: #666; margin-bottom: 30px; }
        
        input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #EEEEEE;
            font-size: 16px;
        }
        
        .analogies-title { font-weight: bold; margin-bottom: 10px; color: #333; }
        .analogies-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            background-color: #6200EE; 
            color: white; 
            border: none; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 8px; 
        }
        #statusMessage { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Nguru</h1>
        <p class="subtitle">Let's build your mind object.</p>

        <input type="email" id="emailInput" placeholder="Email Address">
        <input type="password" id="passwordInput" placeholder="Password">

        <div class="analogies-title">What makes sense to you?</div>
        <div class="analogies-grid">
            <label><input type="checkbox" value="Football"> Football</label>
            <label><input type="checkbox" value="Street Business"> Street Business</label>
            <label><input type="checkbox" value="Crypto"> Crypto</label>
            <label><input type="checkbox" value="Music Production"> Music Production</label>
        </div>

        <button onclick="registerUser()">Enter Nguru</button>
        <p id="statusMessage"></p>
    </div>

    <script>
        // This JavaScript connects your screen to the Render backend we just built
        async function registerUser() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const statusText = document.getElementById('statusMessage');

            if (!email || !password) {
                statusText.style.color = "red";
                statusText.innerText = "Please enter an email and password.";
                return;
            }

            statusText.style.color = "#666";
            statusText.innerText = "Connecting to Nguru Engine...";

            try {
                // Replace this URL with your actual live Render URL
                const response = await fetch("https://nguru-engine.onrender.com/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (response.status === 201 || response.status === 200) {
                    statusText.style.color = "green";
                    statusText.innerText = "Mind Object Created! Welcome.";
                    
                    // Save the userId to the phone's local storage
                    localStorage.setItem("nguru_userId", data.userId);
                    
                    // We will add the code here later to jump to the Chat Screen
                } else {
                    statusText.style.color = "red";
                    statusText.innerText = "Error: " + (data.error || "Could not connect.");
                }
            } catch (error) {
                statusText.style.color = "red";
                statusText.innerText = "Server offline or connection failed.";
            }
        }
    </script>
</body>
</html>
